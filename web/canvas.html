<!DOCTYPE html>
<html>
<head>
    <title>Hand Drawing Canvas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; }
        canvas { display: block; }

    #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    z-index: 10;
}
    </style>
</head>
<body>

    <div id="controls">
    <input type="color" id="colorPicker" value="#000000">
    
    <input type="range" id="brushSize" min="1" max="20" value="4">
    
    <button id="clearBtn">Clear</button>
</div>
<canvas id="drawCanvas"></canvas>

<script>
let colorPicker = document.getElementById("colorPicker");
let brushSize = document.getElementById("brushSize");
let clearBtn = document.getElementById("clearBtn");
let canvas = document.getElementById("drawCanvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

ctx.lineCap = "round";
ctx.lineJoin = "round";
ctx.strokeStyle = "black";
ctx.lineWidth = 4;

// 🔥 WebSocket
let socket = new WebSocket("ws://localhost:8765");

socket.onopen = () => {
    console.log("Connected to server");
};

socket.onerror = (err) => {
    console.log("WebSocket error:", err);
};

socket.onmessage = function(event) {

    console.log("DATA:", event.data);  // 👈 DEBUG

    let parts = event.data.split(",");
    if (parts.length < 3) return;

    let x = parseFloat(parts[0]);
    let y = parseFloat(parts[1]);
    let pinch = parts[2];

    let drawX = (x / screen.width) * canvas.width;
    let drawY = (y / screen.height) * canvas.height;

    if (pinch == "1") {

        points.push({x: drawX, y: drawY});

        if (points.length > 10) points.shift();

        if (points.length < 3) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 2; i++) {
            let xc = (points[i].x + points[i + 1].x) / 2;
            let yc = (points[i].y + points[i + 1].y) / 2;

            ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
        }
  ctx.strokeStyle = colorPicker.value;
ctx.lineWidth = brushSize.value;
        ctx.stroke();

    } else {
        points = [];
    }
};
clearBtn.onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};
</script>


</body>
</html>
