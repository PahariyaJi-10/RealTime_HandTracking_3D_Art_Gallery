<!DOCTYPE html>
<html>
<head>
<title>Hand Drawing Canvas</title>
<style>

#imageModal {
    display: none;
    position: fixed;
    z-index: 100;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);

    justify-content: center;
    align-items: center;
}

/* Image styling */
#modalImg {
    max-width: 80%;
    max-height: 80%;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* Close button */
#closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

#closeModal:hover {
    transform: scale(1.2);
}
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    font-family: 'Segoe UI', sans-serif;
}

canvas {
    display: block;
}
#gallery {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);

    display: none;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    padding: 30px;

    z-index: 20;
}

/* 🔥 SQUARE CARDS */
.gallery-item {
    width: 100%;
    aspect-ratio: 1 / 1;   /* ⭐ KEY LINE */
    overflow: hidden;
    border-radius: 12px;
    position: relative;
    background: #222;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.gallery-item:hover {
    transform: scale(1.05);
}

/* 🔥 IMAGE FIT FIX */
.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* ⭐ KEY LINE */
    background: white;
}
.gallery-item:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}
#controls {
    position: fixed;
    top: 20px;
    left: 20px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.6);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
    
}

#controls label {
    font-size: 12px;
    color: #333;
}

#controls input[type="color"] {
    width: 100%;
    height: 40px;
    border-radius: 8px;
}

#controls input[type="range"] {
    width: 100%;
}

#controls button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

#clearBtn {
    background: #ff4d4d;
    color: white;
}

#saveBtn {
    background: #4CAF50;
    color: white;
}
#closeGallery {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 30;

    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: red;
    color: white;
    cursor: pointer;

    display: none;
}
/* 🔥 DARK MODE */
.dark-mode {
    background: #121212 !important;
}

.dark-mode #controls {
    background: rgba(30, 30, 30, 0.8);
    color: white;
}

.dark-mode label {
    color: #ddd;
}
</style>
</head>

<body>

<div id="controls">
    <div id="imageModal">
    <span id="closeModal">❌</span>
    <img id="modalImg">
</div>
    <label>🎨 Color</label>
    <input type="color" id="colorPicker" value="#000000">

    <label>✏️ Brush Size</label>
    <input type="range" id="brushSize" min="1" max="20" value="4">

    <button id="clearBtn">🧽 Clear</button>
    <button id="saveBtn">💾 Save</button>
    <button id="themeBtn">🌙 Dark Mode</button>
    <button id="galleryBtn">🖼️ Gallery</button>
    <button id="closeGallery">❌ Close</button>
</div>

<canvas id="drawCanvas"></canvas>
<div id="gallery" style="display:none;"></div>
<script>
    let galleryBtn = document.getElementById("galleryBtn");
let gallery = document.getElementById("gallery");

// Open gallery
galleryBtn.onclick = () => {
    gallery.style.display = "grid";
    loadGallery();
};

// Load images
function loadGallery() {
    gallery.innerHTML = "";

    let drawings = JSON.parse(localStorage.getItem("drawings")) || [];

    if (drawings.length === 0) {
        gallery.innerHTML = "<h2 style='color:white'>No drawings yet 😢</h2>";
        return;
    }

    drawings.forEach(imgData => {

        // ✅ CREATE IMAGE FIRST
        let img = document.createElement("img");
        img.src = imgData;

        img.style.width = "100%";
        img.style.borderRadius = "10px";
        img.style.cursor = "pointer";

        // ✅ CLICK HANDLER
img.onclick = () => {
    imageModal.style.display = "flex";
    modalImg.src = imgData;
};

closeModal.onclick = () => {
    imageModal.style.display = "none";
};

imageModal.onclick = (e) => {
    if (e.target === imageModal) {
        imageModal.style.display = "none";
    }
};
        // ✅ WRAPPER CARD
        let card = document.createElement("div");
        card.className = "gallery-item";

        card.appendChild(img);
        gallery.appendChild(card);
    });
}


// Close gallery on click outside
gallery.onclick = () => {
    gallery.style.display = "none";
};
let colorPicker = document.getElementById("colorPicker");
let brushSize = document.getElementById("brushSize");
let clearBtn = document.getElementById("clearBtn");
let saveBtn = document.getElementById("saveBtn");
let imageModal = document.getElementById("imageModal");
let modalImg = document.getElementById("modalImg");
let closeModal = document.getElementById("closeModal");
let canvas = document.getElementById("drawCanvas");
let ctx = canvas.getContext("2d");
clearBtn.onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 🔥 IMPORTANT (reset smooth drawing buffer)
    points = [];
};
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

ctx.lineCap = "round";
ctx.lineJoin = "round";

// WebSocket
let socket = new WebSocket("ws://localhost:8765");

socket.onopen = () => {
    console.log("Connected to server");
};

socket.onmessage = function(event) {

    let [x, y, mode] = event.data.split(",");

    x = parseFloat(x);
    y = parseFloat(y);

    let drawX = (x / screen.width) * canvas.width;
    let drawY = (y / screen.height) * canvas.height;

    if (mode === "draw") {

        points.push({x: drawX, y: drawY});

        if (points.length > 10) points.shift();
        if (points.length < 3) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 2; i++) {
            let xc = (points[i].x + points[i + 1].x) / 2;
            let yc = (points[i].y + points[i + 1].y) / 2;

            ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
        }

        ctx.strokeStyle = colorPicker.value;
        ctx.lineWidth = brushSize.value;
        ctx.stroke();

    } else if (mode === "erase") {

        ctx.beginPath();
        ctx.arc(drawX, drawY, 20, 0, Math.PI * 2);
        ctx.fillStyle = isDark ? "#121212" : "#eef2f3"; 
        ctx.fill();

        points = [];

    } else {
        points = [];
    }
};

// 🔥 BUTTONS (CORRECT PLACE)
saveBtn.onclick = () => {

    let image = canvas.toDataURL("image/png");

    // 🔥 Save to localStorage
    let drawings = JSON.parse(localStorage.getItem("drawings")) || [];
    drawings.push(image);
    localStorage.setItem("drawings", JSON.stringify(drawings));

    // Optional download
    let link = document.createElement("a");
    link.href = image;
    link.download = "drawing_" + Date.now() + ".png";
    link.click();

    alert("Saved to gallery!");
};
let themeBtn = document.getElementById("themeBtn");

let isDark = false;

themeBtn.onclick = () => {
    document.body.classList.toggle("dark-mode");

    isDark = !isDark;

    if (isDark) {
        themeBtn.innerText = "☀️ Light Mode";
    } else {
        themeBtn.innerText = "🌙 Dark Mode";
    }
};
let closeGallery = document.getElementById("closeGallery");

galleryBtn.onclick = () => {
    gallery.style.display = "grid";
    closeGallery.style.display = "block";
    loadGallery();
};

closeGallery.onclick = () => {
    gallery.style.display = "none";
    closeGallery.style.display = "none";
};
</script>
</body>
</html>
