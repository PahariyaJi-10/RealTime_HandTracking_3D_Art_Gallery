<!DOCTYPE html>
<html>
<head>
    let saveBtn = document.getElementById("saveBtn");
    <title>Hand Drawing Canvas</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    font-family: 'Segoe UI', sans-serif;
}

canvas {
    display: block;
}

/* 🔥 Modern Control Panel */
#controls {
    position: fixed;
    top: 20px;
    left: 20px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.6);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}

/* Labels */
#controls label {
    font-size: 12px;
    color: #333;
}

/* Inputs */
#controls input[type="color"] {
    width: 100%;
    height: 40px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#controls input[type="range"] {
    width: 100%;
}

/* Buttons */
#controls button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

/* Clear button */
#clearBtn {
    background: #ff4d4d;
    color: white;
}

#clearBtn:hover {
    background: #e60000;
}

/* Save button */
#saveBtn {
    background: #4CAF50;
    color: white;
}

#saveBtn:hover {
    background: #2e7d32;
}
</style>
    
</head>
<body>

<div id="controls">

    <label>🎨 Color</label>
    <input type="color" id="colorPicker" value="#000000">

    <label>✏️ Brush Size</label>
    <input type="range" id="brushSize" min="1" max="20" value="4">

    <button id="clearBtn">🧽 Clear</button>
    <button id="saveBtn">💾 Save</button>

</div>
<canvas id="drawCanvas"></canvas>

<script>
let colorPicker = document.getElementById("colorPicker");
let brushSize = document.getElementById("brushSize");
let clearBtn = document.getElementById("clearBtn");

let canvas = document.getElementById("drawCanvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

ctx.lineCap = "round";
ctx.lineJoin = "round";

// WebSocket
let socket = new WebSocket("ws://localhost:8765");

socket.onopen = () => {
    console.log("Connected to server");
};

socket.onmessage = function(event) {

    console.log("DATA:", event.data);

    // 🔥 ADD THIS HERE
    let [x, y, draw] = event.data.split(",");

    x = parseFloat(x);
    y = parseFloat(y);

    let drawX = (x / screen.width) * canvas.width;
    let drawY = (y / screen.height) * canvas.height;

    if (draw == "1") {

        points.push({x: drawX, y: drawY});

        if (points.length > 10) points.shift();
        if (points.length < 3) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length - 2; i++) {
            let xc = (points[i].x + points[i + 1].x) / 2;
            let yc = (points[i].y + points[i + 1].y) / 2;

            ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
        }

        // 🔥 USE GESTURE COLOR
        ctx.strokeStyle = color || colorPicker.value;
        ctx.lineWidth = brushSize.value;

        ctx.stroke();

    } else {
        points = [];
    }
};

// Clear button
clearBtn.onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};
saveBtn.onclick = () => {

    // Convert canvas to image
    let image = canvas.toDataURL("image/png");

    // Create download link
    let link = document.createElement("a");
    link.href = image;
    link.download = "my_drawing.png";

    // Trigger download
    link.click();
};
</script>


</body>
</html>
