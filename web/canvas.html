<!DOCTYPE html>
<html>
<head>
<title>Hand Drawing Canvas</title>
<style>
/* 🔥 BUTTON BASE */
#controls button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

/* 🔥 CLEAR BUTTON (RED) */
#clearBtn {
    background: #ff4d4d;
    color: white;
}

#clearBtn:hover {
    background: #e60000;
}

/* 🔥 SAVE BUTTON (GREEN) */
#saveBtn {
    background: #4CAF50;
    color: white;
}

#saveBtn:hover {
    background: #2e7d32;
}

/* 🔥 GALLERY BUTTON (LIGHT STYLE) */
#galleryBtn {
    background: #e0e0e0;
}
/* ✅ MODAL */
#imageModal {
    display: none;
    position: fixed;
    z-index: 100;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#modalImg {
    max-width: 80%;
    max-height: 80%;
    border-radius: 12px;
}

#closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

/* YOUR ORIGINAL STYLES (UNCHANGED) */
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    font-family: 'Segoe UI', sans-serif;
}

canvas { display: block; }

#gallery {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
    padding: 30px;
    z-index: 20;
}

.gallery-item {
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 12px;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
    cursor: pointer;
}

#controls {
    position: fixed;
    top: 20px;
    left: 20px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.6);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}
</style>
</head>

<body>

<div id="controls">
    <button id="saveBtn">💾 Save</button>
    <button id="galleryBtn">🖼️ Gallery</button>
    <button id="closeGallery">❌ Close</button>
</div>

<canvas id="drawCanvas"></canvas>
<div id="gallery"></div>

<!-- ✅ MOVED OUTSIDE -->
<div id="imageModal">
    <span id="closeModal">❌</span>
    <img id="modalImg">
</div>

<script>

// ELEMENTS
let galleryBtn = document.getElementById("galleryBtn");
let gallery = document.getElementById("gallery");
let closeGallery = document.getElementById("closeGallery");

let imageModal = document.getElementById("imageModal");
let modalImg = document.getElementById("modalImg");
let closeModal = document.getElementById("closeModal");

// OPEN GALLERY
galleryBtn.onclick = () => {
    gallery.style.display = "grid";
    closeGallery.style.display = "block";
    loadGallery();
};

// CLOSE GALLERY
closeGallery.onclick = () => {
    gallery.style.display = "none";
    closeGallery.style.display = "none";
};

// LOAD GALLERY
function loadGallery() {
    gallery.innerHTML = "";
    let drawings = JSON.parse(localStorage.getItem("drawings")) || [];

    drawings.forEach(imgData => {

        let img = document.createElement("img");
        img.src = imgData;

        // ✅ FIXED CLICK
        img.onclick = (e) => {
            e.stopPropagation(); // 🔥 prevents gallery closing
            imageModal.style.display = "flex";
            modalImg.src = img.src;
        };

        let card = document.createElement("div");
        card.className = "gallery-item";
        card.appendChild(img);

        gallery.appendChild(card);
    });
}

// CLOSE MODAL
closeModal.onclick = () => {
    imageModal.style.display = "none";
};

// CLICK OUTSIDE MODAL
imageModal.onclick = (e) => {
    if (e.target === imageModal) {
        imageModal.style.display = "none";
    }
};

</script>

</body>
</html>
